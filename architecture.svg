<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">PrizePilot architecture</title>
  <desc id="desc">Opportunity inputs flow through local scoring, optional Qwen refinement, and human approval checkpoints.</desc>
  <rect width="900" height="360" fill="#f6f8fb"/>
  <rect x="60" y="90" width="190" height="110" rx="8" fill="#ffffff" stroke="#385a7c" stroke-width="2"/>
  <text x="155" y="130" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#14213d">Opportunity Data</text>
  <text x="155" y="160" text-anchor="middle" font-family="Arial" font-size="13" fill="#4f5d75">Rules, prizes, blockers</text>
  <rect x="355" y="90" width="190" height="110" rx="8" fill="#ffffff" stroke="#2a9d8f" stroke-width="2"/>
  <text x="450" y="128" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#14213d">Local Planner</text>
  <text x="450" y="160" text-anchor="middle" font-family="Arial" font-size="13" fill="#4f5d75">Score and rank routes</text>
  <rect x="650" y="90" width="190" height="110" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="745" y="128" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#14213d">Human Queue</text>
  <text x="745" y="160" text-anchor="middle" font-family="Arial" font-size="13" fill="#4f5d75">Approve external actions</text>
  <rect x="355" y="245" width="190" height="70" rx="8" fill="#14213d"/>
  <text x="450" y="276" text-anchor="middle" font-family="Arial" font-size="16" font-weight="700" fill="#ffffff">Optional Qwen Cloud</text>
  <text x="450" y="298" text-anchor="middle" font-family="Arial" font-size="12" fill="#d8e2ef">Runtime key only</text>
  <path d="M250 145 H355" stroke="#14213d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M545 145 H650" stroke="#14213d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M450 200 V245" stroke="#14213d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#14213d"/>
    </marker>
  </defs>
</svg>
